# Lead-list runner (Lane C; follows Lane A's enrichment.yml pattern).
# Processes PENDING lead_lists created from the Proprietary Deal Flow tab so
# UI-created builds run without a human — then promotes newly outreach-ready
# leads into companies (John 7/11: auto-promotion is the critical path).
#
# Cadence: every 15 minutes (John 7/12 — his list sat "queued · 0 found" for
# hours; a build must start within minutes of the click). A cheap curl guard
# skips the heavy steps when nothing is pending, so idle ticks cost seconds.
#
# REQUIRED REPO SECRETS (same set John is adding for the other workflows):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
#   SERPER_API_KEY, GOOGLE_PLACES_API_KEY, EXA_API_KEY   (paid/rescue sources)

name: Lead-List Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: leadgen
  cancel-in-progress: false

jobs:
  run-lists:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check for pending lists
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          COUNT=$(curl -sf "$SUPABASE_URL/rest/v1/lead_lists?status=eq.pending&select=id" \
            -H "apikey: $SUPABASE_SERVICE_KEY" -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            | grep -o '"id"' | wc -l)
          echo "pending=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Pending lead lists: $COUNT"
      - uses: actions/checkout@v4
        if: steps.check.outputs.pending != '0' || github.event_name == 'workflow_dispatch'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.pending != '0' || github.event_name == 'workflow_dispatch'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        if: steps.check.outputs.pending != '0' || github.event_name == 'workflow_dispatch'
        working-directory: scraper
      - name: Run pending lead lists
        if: steps.check.outputs.pending != '0' || github.event_name == 'workflow_dispatch'
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: node leadgen/run_leadgen.js
      - name: Promote newly outreach-ready leads
        if: steps.check.outputs.pending != '0' || github.event_name == 'workflow_dispatch'
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node promote_leads.js
      - name: Auto-draft owner outreach on CONTACTABLE (queue only, never sends)
        # PAUSED per John 7/13 ~11:15 (PM chat): drafts were too broad (non-
        # priority industries got drafted) and content not tailored enough.
        # Re-enable ONLY after DRAFT RULES ship + John approves 5 sample
        # drafts (TASK-QUEUE Lane C top item).
        if: ${{ false }}
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node auto_draft_owners.js --limit 25

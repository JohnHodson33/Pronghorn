# Lead-list runner (Lane C; follows Lane A's enrichment.yml pattern).
# Processes PENDING lead_lists created from the Proprietary Deal Flow tab so
# UI-created builds run without a human — then promotes newly outreach-ready
# leads into companies (John 7/11: auto-promotion is the critical path).
#
# REQUIRED REPO SECRETS (same set John is adding for the other workflows):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
#   SERPER_API_KEY, GOOGLE_PLACES_API_KEY, EXA_API_KEY   (paid/rescue sources)

name: Lead-List Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "30 15,22 * * *" # 08:30 & 15:30 America/Phoenix

concurrency:
  group: leadgen
  cancel-in-progress: false

jobs:
  run-lists:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
      - name: Run pending lead lists
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: node leadgen/run_leadgen.js
      - name: Promote newly outreach-ready leads
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node promote_leads.js

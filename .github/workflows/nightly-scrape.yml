# Nightly scrape-all → Supabase (Lane A ops automation).
# Runs the full pipeline (all enabled sources, mirror dedup, Claude screener)
# once a day at 6:00 AM Arizona (MST = UTC-7 → 13:00 UTC), matching the existing
# local Windows Task Scheduler job. Also manually runnable via "Run workflow".
#
# DORMANT until the repo secrets below are added (Settings → Secrets and
# variables → Actions). Without them the job would fail fast, so keep the
# schedule commented is unnecessary — GitHub just runs it once secrets exist.
#
# REQUIRED REPO SECRETS:
#   SUPABASE_URL           — Supabase project URL
#   SUPABASE_SERVICE_KEY   — Supabase service-role (secret) key
#   ANTHROPIC_API_KEY      — Claude API key (tier screener)

name: Nightly Scrape

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated source subset (blank = all enabled)"
        required: false
        default: ""
      no_screen:
        description: "Skip the Claude screener (true/false)"
        required: false
        default: "false"
  schedule:
    - cron: "0 13 * * *" # 06:00 America/Phoenix (no DST)

concurrency:
  group: scrape-pipeline
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome (puppeteer-core has no bundled Chromium)
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.sources }}" ]; then ARGS="$ARGS --source ${{ github.event.inputs.sources }}"; fi
          if [ "${{ github.event.inputs.no_screen }}" = "true" ]; then ARGS="$ARGS --no-screen"; fi
          node run_supabase.js $ARGS
